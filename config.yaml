languageCode: "en-us"
baseUrl: "https://kalverra.github.io"
title: "Adam's Writing Thing"
theme: "anubis"
paginate: 15
enableRobotsTXT: true

menu:
  main:
  - identifier: posts
    name: Posts
    title: Posts
    url: /
    weight: 1
  - identifier: categories
    name: Categories
    title: Categories
    url: /categories/
    weight: 2
  - identifier: tags
    name: Tags
    title: Tags
    url: /tags/
    weight: 3
  - identifier: about
    name: About
    title: About
    url: /about/
    weight: 4

taxonomies:
  category: categories
  tag: tags

params:
  author: "Adam Hamrick"
  email: mail@example.org # used for microformats
  avatar: "/images/head_shot.jpeg" # used for microformats
  description: ""
  disableSummary: false
  # Uncomment if you need this
  # images:
  #   - images/og-featured.png # relative path to "static" directory
  # customCSS:
  #   - css/my.css # relative path to "assets" directory (don't use main.css filename)
  # customJS:
  #   - js/main.js # relative path to "assets" directory
  dateFormat: "2006-01-02"
  paginationSinglePost: true
  style: dark-without-switcher
  readMore: false
  copyCodeButton: true 
  rssAsSocialIcon: false
  social:
  - id: github
    name: kalverra
  - id: twitter
    name: adam7hamrick

markup:
  goldmark:
    renderer:
      unsafe: true # enable raw HTML in Markdown